<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:composition template="/template.xhtml">
        <ui:define name="title">
            <h:outputText value="#{bundle.ViewCarTitle}"></h:outputText>
        </ui:define>
        <ui:define name="body">
            <h:panelGroup id="messagePanel" layout="block">
                <h:messages errorStyle="color: red" infoStyle="color: green" layout="table"/>
            </h:panelGroup>
            <h:form>
                <h:panelGrid columns="2">
                    <h:outputText value="#{bundle.ViewCarLabel_carId}"/>
                    <h:outputText value="#{carController.selected.carId}" title="#{bundle.ViewCarTitle_carId}"/>
                    <h:outputText value="#{bundle.ViewCarLabel_brand}"/>
                    <h:outputText value="#{carController.selected.brand}" title="#{bundle.ViewCarTitle_brand}"/>
                    <h:outputText value="#{bundle.ViewCarLabel_model}"/>
                    <h:outputText value="#{carController.selected.model}" title="#{bundle.ViewCarTitle_model}"/>
                    <h:outputText value="#{bundle.ViewCarLabel_carYear}"/>
                    <h:outputText value="#{carController.selected.carYear}" title="#{bundle.ViewCarTitle_carYear}"/>
                    <h:outputText value="#{bundle.ViewCarLabel_price}"/>
                    <h:outputText value="#{carController.selected.price}" title="#{bundle.ViewCarTitle_price}"/>
                    <h:outputText value="#{bundle.ViewCarLabel_status}"/>
                    <h:outputText value="#{carController.selected.status}" title="#{bundle.ViewCarTitle_status}"/>
                </h:panelGrid>
                <br />
                <h:commandLink action="#{carController.destroyAndView}" value="#{bundle.ViewCarDestroyLink}"/>
                <br />
                <br />
                <h:link outcome="Edit" value="#{bundle.ViewCarEditLink}"/>
                <br />
                <h:commandLink action="#{carController.prepareCreate}" value="#{bundle.ViewCarCreateLink}" />
                <br />
                <h:commandLink action="#{carController.prepareList}" value="#{bundle.ViewCarShowAllLink}"/>
                <br />
                <br />
                <h:link outcome="/index" value="#{bundle.ViewCarIndexLink}"/>

            </h:form>
        </ui:define>
    </ui:composition>

</html>
