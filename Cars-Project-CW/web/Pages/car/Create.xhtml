<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:composition template="/template.xhtml">
        <ui:define name="title">
            <h:outputText value="#{bundle.CreateCarTitle}"></h:outputText>
        </ui:define>
        <ui:define name="body">
            <h:panelGroup id="messagePanel" layout="block">
                <h:messages errorStyle="color: red" infoStyle="color: green" layout="table"/>
            </h:panelGroup>
            <h:form>
                <h:panelGrid columns="2">
                    <h:outputLabel value="#{bundle.CreateCarLabel_carId}" for="carId" />
                    <h:inputText id="carId" value="#{carController.selected.carId}" title="#{bundle.CreateCarTitle_carId}" required="true" requiredMessage="#{bundle.CreateCarRequiredMessage_carId}"/>
                    <h:outputLabel value="#{bundle.CreateCarLabel_brand}" for="brand" />
                    <h:inputText id="brand" value="#{carController.selected.brand}" title="#{bundle.CreateCarTitle_brand}" required="true" requiredMessage="#{bundle.CreateCarRequiredMessage_brand}"/>
                    <h:outputLabel value="#{bundle.CreateCarLabel_model}" for="model" />
                    <h:inputText id="model" value="#{carController.selected.model}" title="#{bundle.CreateCarTitle_model}" required="true" requiredMessage="#{bundle.CreateCarRequiredMessage_model}"/>
                    <h:outputLabel value="#{bundle.CreateCarLabel_carYear}" for="carYear" />
                    <h:inputText id="carYear" value="#{carController.selected.carYear}" title="#{bundle.CreateCarTitle_carYear}" />
                    <h:outputLabel value="#{bundle.CreateCarLabel_price}" for="price" />
                    <h:inputText id="price" value="#{carController.selected.price}" title="#{bundle.CreateCarTitle_price}" />
                    <h:outputLabel value="#{bundle.CreateCarLabel_status}" for="status" />
                    <h:inputText id="status" value="#{carController.selected.status}" title="#{bundle.CreateCarTitle_status}" />
                </h:panelGrid>
                <br />
                <h:commandLink action="#{carController.create}" value="#{bundle.CreateCarSaveLink}" />
                <br />
                <br />
                <h:commandLink action="#{carController.prepareList}" value="#{bundle.CreateCarShowAllLink}" immediate="true"/>
                <br />
                <br />
                <h:link outcome="/index" value="#{bundle.CreateCarIndexLink}"/>
            </h:form>
        </ui:define>
    </ui:composition>

</html>
