<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:composition template="/template.xhtml">

        <ui:define name="body">

            <h:form styleClass="form-wrapper">

                <h2>Create Car</h2>

                <h:panelGrid columns="2">

                    <h:outputLabel value="Brand"/>
                    <h:inputText value="#{carController.selected.brand}"/>

                    <h:outputLabel value="Model"/>
                    <h:inputText value="#{carController.selected.model}"/>

                    <h:outputLabel value="Year"/>
                    <h:inputText value="#{carController.selected.carYear}"/>

                    <h:outputLabel value="Price"/>
                    <h:inputText value="#{carController.selected.price}"/>

                </h:panelGrid>

                <br/>

                <h:commandButton value="Save"
                                 action="#{carController.create}"
                                 styleClass="btn"/>

                <h:link outcome="/Pages/car/List"
                        value="Back"
                        styleClass="btn btn-outline"/>

            </h:form>

        </ui:define>

    </ui:composition>

</html>
