<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Car E-Commerce</title>
        <h:outputStylesheet name="css/jsfcrud.css"/>
    </h:head>
    <h:body>
        <div class="navbar">
            <div class="logo">🚗 CarShop</div>

            <div class="nav-links">
                <h:link outcome="/index" value="Home" />
                <h:link outcome="/Pages/car/List" value="Cars" />
                <h:link outcome="/Pages/orders/List" value="Orders" />
                <h:link outcome="/about" value="About" />
            </div>

            <div class="auth-buttons">
                <h:link outcome="/login" value="Login" styleClass="btn small"/>
                <h:link outcome="/register" value="Register" styleClass="btn small btn-outline"/>
            </div>
        </div>

        <div class="auth-page">

            <div class="auth-card">
                <h2>Login</h2>

                <h:form>
                    <h:messages infoStyle="color:green" errorStyle="color:red"/>
                    <!-- validation check -->
                    <h:inputText value="#{authBean.email}" required="true" requiredMessage="Email is required">
                        <f:passThroughAttribute name="placeholder" value="Email"/>
                    </h:inputText>

                    <h:inputSecret value="#{authBean.password}" required="true" requiredMessage="Password is required">
                        <f:passThroughAttribute name="placeholder" value="Password"/>
                    </h:inputSecret>
                    <h:commandButton value="Login"
                                     action="#{authBean.login()}"
                                     styleClass="auth-btn"/>

                    <h:link outcome="/register" value="Don't have an account?" styleClass="auth-link"/>
                </h:form>
            </div>

        </div>
    </h:body>
</html>
