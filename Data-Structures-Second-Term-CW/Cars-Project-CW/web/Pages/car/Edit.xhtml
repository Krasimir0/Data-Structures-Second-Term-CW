<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:composition template="/template.xhtml">
        <ui:define name="title">
            <h:outputText value="#{bundle.EditCarTitle}"></h:outputText>
        </ui:define>
        <ui:define name="body">
            <h:panelGroup id="messagePanel" layout="block">
                <h:messages errorStyle="color: red" infoStyle="color: green" layout="table"/>
            </h:panelGroup>
            <h:form>
                <h:panelGrid columns="2">
                    <h:outputLabel value="#{bundle.EditCarLabel_carId}" for="carId" />
                    <h:inputText id="carId" value="#{carController.selected.carId}" title="#{bundle.EditCarTitle_carId}" required="true" requiredMessage="#{bundle.EditCarRequiredMessage_carId}"/>
                    <h:outputLabel value="#{bundle.EditCarLabel_brand}" for="brand" />
                    <h:inputText id="brand" value="#{carController.selected.brand}" title="#{bundle.EditCarTitle_brand}" required="true" requiredMessage="#{bundle.EditCarRequiredMessage_brand}"/>
                    <h:outputLabel value="#{bundle.EditCarLabel_model}" for="model" />
                    <h:inputText id="model" value="#{carController.selected.model}" title="#{bundle.EditCarTitle_model}" required="true" requiredMessage="#{bundle.EditCarRequiredMessage_model}"/>
                    <h:outputLabel value="#{bundle.EditCarLabel_carYear}" for="carYear" />
                    <h:inputText id="carYear" value="#{carController.selected.carYear}" title="#{bundle.EditCarTitle_carYear}" />
                    <h:outputLabel value="#{bundle.EditCarLabel_price}" for="price" />
                    <h:inputText id="price" value="#{carController.selected.price}" title="#{bundle.EditCarTitle_price}" />
                    <h:outputLabel value="#{bundle.EditCarLabel_status}" for="status" />
                    <h:inputText id="status" value="#{carController.selected.status}" title="#{bundle.EditCarTitle_status}" />
                </h:panelGrid>
                <h:commandLink action="#{carController.update}" value="#{bundle.EditCarSaveLink}"/>
                <br />
                <br />
                <h:link outcome="View" value="#{bundle.EditCarViewLink}"/>
                <br />
                <h:commandLink action="#{carController.prepareList}" value="#{bundle.EditCarShowAllLink}" immediate="true"/>
                <br />
                <br />
                <h:link outcome="/index" value="#{bundle.EditCarIndexLink}" />
            </h:form>
        </ui:define>
    </ui:composition>

</html>
